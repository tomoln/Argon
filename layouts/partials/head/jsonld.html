{{- /* TechArticle JSON-LD 構造化データ
  記事ページ（.Type == "posts"）のみ出力します。
  GEO（Generative Engine Optimization）対策として、
  AIクローラーが記事内容を正しく解釈できるようにします。
  Copyright (c) 2026 Tomo. All rights reserved.
*/ -}}
{{- if and (eq .Type "posts") (eq .Kind "page") -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "TechArticle",
  "headline": {{ .Title | jsonify }},
  "description": {{ .Description | default (substr .Summary 0 160) | jsonify }},
  "datePublished": {{ .Date.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" | default .Date.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "author": {
    "@type": "Person",
    "name": {{ .Site.Params.author.name | default "Tomo" | jsonify }},
    "url": {{ .Site.BaseURL | jsonify }}
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | jsonify }}
  },
  "wordCount": {{ .WordCount }},
  "timeRequired": {{ .Params.timeRequired | default "PT5M" | jsonify }},
  "inLanguage": {{ .Site.LanguageCode | default "ja-JP" | jsonify }},
  "image": {{ with .Params.images }}{{ index . 0 | absURL | jsonify }}{{ else }}{{ .Site.Params.images | default slice | first 1 | jsonify }}{{ end }},
  "publisher": {
    "@type": "Organization",
    "name": {{ .Site.Title | jsonify }},
    "logo": {
      "@type": "ImageObject",
      "url": {{ "logo.png" | absURL | jsonify }}
    }
  }
}
</script>
{{- end -}}
